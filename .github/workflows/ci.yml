name: CI

# NOTE: this repo has no git remote yet (Phase 0 finding). This workflow
# becomes active the moment the repo is pushed to GitHub. Until then, run
# the same gates locally via `npm run verify`.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (blocking)
        run: npx tsc --noEmit

      - name: Boundary check (blocking)
        run: npm run check:boundaries

      - name: Unit tests (blocking)
        run: npm run test:unit

      - name: Lint (advisory until burn-down reaches zero)
        run: npm run lint
        continue-on-error: true

      - name: Build (blocking)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke tests (blocking)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
